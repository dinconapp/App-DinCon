services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/dincon.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot
      - ./deploy/certbot/conf:/etc/letsencrypt
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://dincon.com.br/api}
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.production
    depends_on:
      - mariadb
    volumes:
      - backend_storage:/app/storage
    restart: unless-stopped

  mariadb:
    image: mariadb:12.2
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-planejamento_financeiro}
      MARIADB_USER: ${DB_USER:-dincon_app}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mariadb_data:
  backend_storage:
