services:
  - type: web
    name: dincon-backend
    env: python
    rootDir: planejamento-financeiro/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://dincon.com.br,https://www.dincon.com.br
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: TWILIO_WEBHOOK_VALIDATE_SIGNATURE
        value: "true"
